name: Trigger SDK doc regeneration

on:
  push:
    branches: [main]
    paths:
      - "src/skillet/**"

jobs:
  dispatch:
    runs-on: ubuntu-latest

    steps:
      - name: Dispatch sdk-updated event to skillet repo
        uses: actions/github-script@v7
        with:
          # Personal Access Token with `repo` write scope on the skillet repo.
          # Store it as SKILLET_REPO_PAT in this repository's secrets.
          github-token: ${{ secrets.SKILLET_REPO_PAT }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'skilletdev',   // update to your GitHub org
              repo: 'skillet',
              event_type: 'sdk-updated',
              client_payload: {
                sdk_sha: context.sha,
                sdk_ref: context.ref,
              },
            })
